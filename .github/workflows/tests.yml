name: Tests
on:
  push:
    branches:
    - main
    - ci-*
  pull_request:
    paths:
    - .github/**.yml
    - examples/**.py
    - scripts/**.py
    - tests/**.py
    - trl/**.py
    - pyproject.toml
    - '!trl/experimental/**'
    - '!tests/experimental/**'
env:
  TQDM_DISABLE: 1
  CI_SLACK_CHANNEL: ${{ secrets.CI_PUSH_MAIN_CHANNEL }}
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
jobs:
  tests:
    name: Tests
    strategy:
      matrix:
        python-version:
        - '3.10'
      fail-fast: false
    runs-on: ubuntu-latest
    container:
      image: pytorch/pytorch:2.8.0-cuda12.8-cudnn9-devel
      options: --gpus all --memory=28g --memory-swap=28g --shm-size=2g
    defaults:
      run:
        shell: bash
    if: github.event.pull_request.draft == false
    steps:
    - name: Git checkout
      uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Make and Git
      run: 'apt-get update && apt-get install -y make git curl

        '
    - name: Install uv
      run: 'curl -LsSf https://astral.sh/uv/install.sh | sh

        '
    - name: Create Python virtual environment
      run: 'uv venv

        uv pip install --upgrade setuptools wheel

        '
    - name: Install dependencies
      run: 'source .venv/bin/activate

        uv pip install ".[dev]"

        '
    - name: Test with pytest
      run: "set -euo pipefail\n( while true; do\n    echo \"== health $(date -Is)\
        \ ==\"\n    echo \"-- uname/uptime --\"\n    uname -a || true\n    uptime\
        \ || true\n    echo \"-- mem --\"\n    free -h || true\n    echo \"-- disk\
        \ --\"\n    df -h || true\n    echo \"-- top mem procs --\"\n    ps -eo pid,ppid,cmd,%mem,%cpu\
        \ --sort=-%mem | head -n 15 || true\n    echo\n    sleep 30\n  done\n) &\n\
        HEALTH_PID=$!\necho \"Health logger PID: $HEALTH_PID\"\n\nsource .venv/bin/activate\n\
        make test\n\nkill \"$HEALTH_PID\" 2>/dev/null || true\n"
    - name: Post to Slack
      if: github.ref == 'refs/heads/main' && always()
      uses: huggingface/hf-workflows/.github/actions/post-slack@main
      with:
        slack_channel: ${{ env.CI_SLACK_CHANNEL }}
        title: Results with Python ${{ matrix.python-version }} and latest dependencies
        status: ${{ job.status }}
        slack_token: ${{ secrets.SLACK_CIFEEDBACK_BOT_TOKEN }}
